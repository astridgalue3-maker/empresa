<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Tareas Pro - Premium Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1>Mis Tareas</h1>
            <p class="subtitle">Organiza tu día con estilo</p>
        </header>
        
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="¿Qué tienes pendiente hoy?">
            <button id="addBtn" title="Agregar tarea">+</button>
        </div>
        
        <div class="list-wrapper">
            <ul id="taskList"></ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
