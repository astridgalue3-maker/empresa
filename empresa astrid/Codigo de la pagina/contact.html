<body>
    <header>

        <nav>

    <main>
        <h1>Contacto</h1>
        <p class="form-instruction">Llenar el formulario</p>

        <form id="contactForm" onsubmit="return validarFormulario();">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" required placeholder="...">

            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" name="telefono" required placeholder="...">

            <label for="correo">Correo</label>
            <input type="email" id="correo" name="correo" required placeholder="...">

            <label for="comentario">Comentario</label>
            <textarea id="comentario" name="comentario" required placeholder="..."></textarea>

            <button type="submit">Enviar</button>
        </form>
    </main>

    <footer>
        <p>© 2026 A.V.E GAMING SHOP.</p>
        <p><a href="index.html">Ir al inicio</a></p>
